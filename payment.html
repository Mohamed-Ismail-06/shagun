<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shagun Payment</title>
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    body { min-height: 100vh; background: linear-gradient(140deg, #5f57c8, #7a74e6); display: grid; place-items: center; padding: 16px; }
    .card { width: 100%; max-width: 430px; background: #fff; border-radius: 18px; padding: 24px; box-shadow: 0 16px 60px rgba(0,0,0,.24); }
    h1 { color: #5f57c8; margin-bottom: 8px; font-size: 24px; }
    .sub { color: #555; margin-bottom: 18px; font-size: 14px; }
    .group { margin-bottom: 14px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 700; color: #222; }
    input { width: 100%; border: 1px solid #d7d8e6; border-radius: 10px; padding: 12px; font-size: 15px; }
    .amount-row { display: flex; gap: 8px; margin-top: 10px; margin-bottom: 14px; }
    .pill { border: 1px solid #5f57c8; color: #5f57c8; background: #fff; border-radius: 999px; padding: 8px 12px; font-size: 13px; cursor: pointer; }
    .pay-btn { width: 100%; background: #2f9e44; color: #fff; border: 0; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; }
    .pay-btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .fallback-btn { width: 100%; margin-top: 10px; background: #fff; color: #5f57c8; border: 1px solid #5f57c8; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; }
    .msg { margin-top: 14px; font-size: 13px; }
    .ok { color: #166534; }
    .err { color: #b91c1c; }
    .hint { margin-top: 8px; color: #6b7280; font-size: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Shagun Payment</h1>
    <div class="sub" id="weddingName">Wedding Event</div>

    <div class="group">
      <label for="guestName">Your Name</label>
      <input id="guestName" type="text" placeholder="Enter your name">
    </div>

    <div class="group">
      <label for="relation">Relationship</label>
      <input id="relation" type="text" placeholder="Friend, Relative, Colleague...">
    </div>

    <div class="group">
      <label for="amount">Amount (INR)</label>
      <input id="amount" type="number" min="1" step="1" placeholder="Enter amount">
    </div>

    <div class="amount-row">
      <button class="pill" onclick="setAmount(501)">501</button>
      <button class="pill" onclick="setAmount(1001)">1001</button>
      <button class="pill" onclick="setAmount(2001)">2001</button>
      <button class="pill" onclick="setAmount(5001)">5001</button>
    </div>

    <button class="pay-btn" id="payBtn" onclick="startPayment()">Pay with Razorpay</button>
    <button class="fallback-btn" id="upiBtn" onclick="payViaUpiFallback()">Pay via UPI (Fallback)</button>
    <div class="hint">Use fallback only if Razorpay checkout fails to open.</div>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const url = new URLSearchParams(window.location.search);
    const inviteCode = url.get("code") || "";
    const upiId = url.get("upi") || "";
    const weddingName = decodeURIComponent(url.get("wedding") || "Wedding Event");
    document.getElementById("weddingName").textContent = weddingName;

    const backendUrl = "https://shagun-backend-qm4d.onrender.com";

    function setAmount(value) {
      document.getElementById("amount").value = String(value);
    }

    function setMsg(text, ok = false) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = `msg ${ok ? "ok" : "err"}`;
    }

    function payViaUpiFallback() {
      const guestName = document.getElementById("guestName").value.trim();
      const relation = document.getElementById("relation").value.trim();
      const amount = Number(document.getElementById("amount").value);

      if (!upiId) return setMsg("UPI ID missing in QR link.");
      if (!inviteCode) return setMsg("Invite code missing in QR link.");
      if (!guestName) return setMsg("Please enter your name.");
      if (!relation) return setMsg("Please enter relationship.");
      if (!amount || amount <= 0) return setMsg("Please enter a valid amount.");

      const note = `Shagun for ${weddingName} - ${relation}`;
      const upiLink = `upi://pay?pa=${encodeURIComponent(upiId)}&pn=${encodeURIComponent(
        "Shagun Payment"
      )}&am=${encodeURIComponent(amount)}&tn=${encodeURIComponent(note)}&cu=INR`;
      window.location.href = upiLink;
    }

    async function startPayment() {
      const payBtn = document.getElementById("payBtn");
      const guestName = document.getElementById("guestName").value.trim();
      const relation = document.getElementById("relation").value.trim();
      const amount = Number(document.getElementById("amount").value);

      if (!inviteCode) return setMsg("Invite code missing in QR link.");
      if (!guestName) return setMsg("Please enter your name.");
      if (!relation) return setMsg("Please enter relationship.");
      if (!amount || amount <= 0) return setMsg("Please enter a valid amount.");

      payBtn.disabled = true;
      payBtn.textContent = "Preparing payment...";
      setMsg("");

      try {
        const orderRes = await fetch(`${backendUrl}/api/payments/create-order`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ inviteCode, guestName, relation, amount, weddingName }),
        });
        const orderData = await orderRes.json();
        if (!orderRes.ok || !orderData?.orderId || !orderData?.keyId) {
          throw new Error(orderData?.message || "Could not create Razorpay order.");
        }

        const options = {
          key: orderData.keyId,
          amount: orderData.amount,
          currency: orderData.currency || "INR",
          name: "Shagun Ceremony",
          description: `Shagun for ${weddingName}`,
          order_id: orderData.orderId,
          prefill: { name: guestName },
          notes: { inviteCode, relation, weddingName },
          theme: { color: "#5f57c8" },
          handler: async function (response) {
            try {
              const verifyRes = await fetch(`${backendUrl}/api/payments/verify`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                  inviteCode,
                  guestName,
                  relation,
                  amount,
                  weddingName,
                  razorpayOrderId: response.razorpay_order_id,
                  razorpayPaymentId: response.razorpay_payment_id,
                  razorpaySignature: response.razorpay_signature,
                }),
              });
              const verifyData = await verifyRes.json();
              if (!verifyRes.ok || !verifyData?.success) {
                throw new Error(verifyData?.message || "Payment verification failed.");
              }
              setMsg("Payment successful. Thank you for your contribution!", true);
              payBtn.textContent = "Payment Completed";
            } catch (err) {
              setMsg(err.message || "Payment done but verification failed. Please contact host.");
              payBtn.disabled = false;
              payBtn.textContent = "Pay with Razorpay";
            }
          },
          modal: {
            ondismiss: function () {
              payBtn.disabled = false;
              payBtn.textContent = "Pay with Razorpay";
            },
          },
        };

        const rzp = new Razorpay(options);
        rzp.on("payment.failed", function (response) {
          const reason = response?.error?.description || "Payment failed.";
          setMsg(reason);
          payBtn.disabled = false;
          payBtn.textContent = "Pay with Razorpay";
        });
        rzp.open();
        payBtn.textContent = "Waiting for payment...";
      } catch (error) {
        const reason = error.message || "Unable to start payment.";
        setMsg(`${reason} You can use 'Pay via UPI (Fallback)'.`);
        payBtn.disabled = false;
        payBtn.textContent = "Pay with Razorpay";
      }
    }
  </script>
</body>
</html>
